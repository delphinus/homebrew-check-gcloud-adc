name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-13
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: make build ARCH=${{ matrix.arch }}

      - name: Test
        run: ./check-gcloud-adc.app/Contents/MacOS/check-gcloud-adc --help

      - name: Archive
        run: tar czf check-gcloud-adc-${{ matrix.arch }}.tar.gz check-gcloud-adc.app

      - uses: actions/upload-artifact@v4
        with:
          name: check-gcloud-adc-${{ matrix.arch }}
          path: check-gcloud-adc-${{ matrix.arch }}.tar.gz

  release:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" --generate-notes \
            artifacts/check-gcloud-adc-arm64/check-gcloud-adc-arm64.tar.gz \
            artifacts/check-gcloud-adc-x86_64/check-gcloud-adc-x86_64.tar.gz

      - name: Update formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          ARM64_URL="${BASE_URL}/check-gcloud-adc-arm64.tar.gz"
          X86_64_URL="${BASE_URL}/check-gcloud-adc-x86_64.tar.gz"

          ARM64_SHA256=$(shasum -a 256 artifacts/check-gcloud-adc-arm64/check-gcloud-adc-arm64.tar.gz | awk '{print $1}')
          X86_64_SHA256=$(shasum -a 256 artifacts/check-gcloud-adc-x86_64/check-gcloud-adc-x86_64.tar.gz | awk '{print $1}')

          cat > Formula/check-gcloud-adc.rb << FORMULA
          class CheckGcloudAdc < Formula
            desc "Check Google Cloud ADC token validity and notify when expired"
            homepage "https://github.com/${{ github.repository }}"
            version "${VERSION}"

            on_arm do
              url "${ARM64_URL}"
              sha256 "${ARM64_SHA256}"
            end

            on_intel do
              url "${X86_64_URL}"
              sha256 "${X86_64_SHA256}"
            end

            depends_on :macos

            def install
              prefix.install "check-gcloud-adc.app"
              bin.write_exec_script prefix/"check-gcloud-adc.app/Contents/MacOS/check-gcloud-adc"
            end

            service do
              run opt_prefix/"check-gcloud-adc.app/Contents/MacOS/check-gcloud-adc"
              run_type :interval
              interval 300
              environment_variables PATH: "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
              log_path var/"log/check-gcloud-adc/output.log"
              error_log_path var/"log/check-gcloud-adc/error.log"
            end

            test do
              assert_match "Check Google Cloud ADC token validity", shell_output("\#{bin}/check-gcloud-adc --help")
            end
          end
          FORMULA

          # Remove leading spaces from heredoc
          sed -i '' 's/^          //' Formula/check-gcloud-adc.rb

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/check-gcloud-adc.rb
          git commit -m "Update formula for ${TAG}"
          git push origin HEAD:main
